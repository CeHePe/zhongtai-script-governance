name: 指标验证任务
description: 跟踪本地 Codex 指标验证任务，不上传数据文件。
title: "【指标验证】<报表> / <指标> / <期间> / <维度>"
labels:
  - codex-task
  - metric-validation
  - needs-local-data
body:
  - type: markdown
    attributes:
      value: |
        本 Issue 只用于治理留痕。不要上传 Excel、CSV、台账、报表、底表、指标清单、原始导出或本地输出。
  - type: input
    id: report
    attributes:
      label: 报表
      description: 只写报表或工作簿名，不上传文件。
      placeholder: 例如：半收付归母净利润202512项目
    validations:
      required: true
  - type: input
    id: metric
    attributes:
      label: 指标
      description: 写需要验证的准确指标名。
      placeholder: 例如：管报归母净利润_空间
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: 期间
      description: 报表期间。
      placeholder: 例如：2025-12
    validations:
      required: true
  - type: dropdown
    id: dimension
    attributes:
      label: 维度
      options:
        - 项目
        - 区域
        - 条线
        - 空间
        - 专业公司
        - 其他
    validations:
      required: true
  - type: textarea
    id: local_files
    attributes:
      label: 本地使用文件
      description: 只写文件名或本地路径，不上传内容。
      placeholder: |
        - JKS_数据中台二期_指标清单.xlsx
        - 项目查询.xlsx
        - <source report>.xlsx
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 补充范围、口径说明或已知例外。
    validations:
      required: false
