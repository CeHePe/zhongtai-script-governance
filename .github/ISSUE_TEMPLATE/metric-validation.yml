name: Metric validation task
description: Track a local Codex metric validation task without uploading data files.
title: "[Metric] <report> - <metric>"
labels:
  - codex-task
  - metric-validation
  - needs-local-data
body:
  - type: markdown
    attributes:
      value: |
        Use this issue to track local Codex work. Do not attach Excel, CSV, ledger, source report, indicator list, or raw export files.
  - type: input
    id: report
    attributes:
      label: Report
      description: Report or workbook name only. Do not upload the workbook.
      placeholder: e.g. 半收付归母净利润202512项目
    validations:
      required: true
  - type: input
    id: metric
    attributes:
      label: Metric
      description: Exact metric name to validate.
      placeholder: e.g. 管报归母净利润_空间
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: Period
      description: Report period.
      placeholder: e.g. 2025-12
    validations:
      required: true
  - type: dropdown
    id: dimension
    attributes:
      label: Dimension
      options:
        - 项目
        - 区域
        - 条线
        - 空间
        - 专业公司
        - 其他
    validations:
      required: true
  - type: textarea
    id: local_files
    attributes:
      label: Local files to use
      description: File names or local paths only. Do not upload contents.
      placeholder: |
        - JKS_数据中台二期_指标清单.xlsx
        - 项目查询.xlsx
        - <source report>.xlsx
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Clarifications, expected scope, or known exceptions.
    validations:
      required: false
