name: 指标验证任务
description: 跟踪本地 Codex 指标验证任务，不上传数据文件。
title: "【指标验证】<报表类别> / <指标类别> / <期间> / <维度>"
labels:
  - codex-task
  - metric-validation
  - needs-local-data
body:
  - type: markdown
    attributes:
      value: |
        本 Issue 只用于治理留痕。不要上传 Excel、CSV、台账、报表、底表、指标清单、原始导出或本地输出。
        Use sanitized categories rather than raw customer workbook names.
  - type: input
    id: report
    attributes:
      label: 报表类别
      description: 写脱敏后的报表类别或工作簿类别，不写原始文件名。
      placeholder: 例如：半收付口径项目报表
    validations:
      required: true
  - type: input
    id: metric
    attributes:
      label: 指标类别
      description: 写脱敏后的指标类别，不粘贴完整字段口径。
      placeholder: 例如：归母净利润类指标
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: 期间
      description: 报表期间。
      placeholder: 例如：YYYY-MM
    validations:
      required: true
  - type: dropdown
    id: dimension
    attributes:
      label: 维度
      options:
        - 项目
        - 区域
        - 条线
        - 空间
        - 专业公司
        - 其他
    validations:
      required: true
  - type: textarea
    id: local_files
    attributes:
      label: 本地使用文件类别
      description: 只写文件类别或脱敏描述，不上传内容，不写原始客户文件名。
      placeholder: |
        - local-only indicator definition workbook
        - local-only project helper ledger
        - local-only source report workbook
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 补充脱敏后的范围、口径摘要或已知例外。
    validations:
      required: false
