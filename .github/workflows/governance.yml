name: Governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  no-data-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Reject sensitive files
        run: python scripts/governance/check_sensitive_files.py --tracked
      - name: Compile Python scripts
        run: python scripts/governance/compile_python.py
